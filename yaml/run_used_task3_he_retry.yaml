---
version: 0.1
runson: win
autosplit: true
concurrency: 1
runtime:
  language: java
  version: 11
cacheKey: '{{ checksum "pom.xml" }}'
cacheDirectories:
  - .m2
env:
  ENVIRONMENT: staging
pre:
  - mvn -Dmaven.repo.local=./.m2 dependency:resolve
  - echo "===== ENVIRONMENT value in pre-steps below ====="
  - printenv ENVIRONMENT
  - env | grep ENVIRONMENT
testDiscovery:
  type: raw
  mode: dynamic
  command: grep 'test name' xml/testng_retry.xml | awk '{print$2}' | sed 's/name=//g' | sed 's/\x3e//g'
testRunnerCommand: mvn test `-Dplatname=retry `-Dmaven.repo.local=./.m2 dependency:resolve `-DselectedTests=$test
retryOnFailure: true
maxRetries: 2
jobLabel: [selenium-testng, win, task3-retry]
